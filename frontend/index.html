<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>情绪日记 - 登录/注册</title>
    <style>
        .container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .tab { display: flex; margin-bottom: 20px; }
        .tab-item { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-item.active { border-bottom: 2px solid #007bff; color: #007bff; }
        .form { display: none; }
        .form.active { display: block; }
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tab">
            <div class="tab-item active" onclick="switchTab('register')">注册</div>
            <div class="tab-item" onclick="switchTab('login')">登录</div>
        </div>

        <!-- 注册表单 -->
        <div class="form active" id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="请输入密码">
            </div>
            <button onclick="register()">注册</button>
        </div>

        <!-- 登录表单 -->
        <div class="form" id="loginForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="loginEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码">
            </div>
            <button onclick="login()">登录</button>
        </div>

        <!-- 提示消息 -->
        <div id="message"></div>
    </div>

    <script>
        // 后端接口基础地址（和你的服务端口保持一致）
        const BASE_URL = 'http://localhost:3001/api';

        // 切换标签页
        function switchTab(type) {
            // 切换tab样式
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
                if (item.innerText === (type === 'register' ? '注册' : '登录')) {
                    item.classList.add('active');
                }
            });
            // 切换表单显示
            document.getElementById('registerForm').classList.toggle('active', type === 'register');
            document.getElementById('loginForm').classList.toggle('active', type === 'login');
            // 清空提示
            document.getElementById('message').className = '';
            document.getElementById('message').innerText = '';
        }

        // 显示提示消息
        function showMessage(text, isSuccess) {
            const msg = document.getElementById('message');
            msg.innerText = text;
            msg.className = isSuccess ? 'success' : 'error';
        }

        // 注册功能
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();

            // 简单校验
            if (!username || !email || !password) {
                showMessage('请填写所有必填项！', false);
                return;
            }

            try {
                // 调用后端注册接口
                const response = await fetch(`${BASE_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 注册成功：保存token到本地存储
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({
                        id: data._id,
                        username: data.username,
                        email: data.email
                    }));
                    showMessage(`注册成功！欢迎 ${username}`, true);
                    // 自动切换到登录页
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    showMessage(data.msg || '注册失败', false);
                }
            } catch (error) {
                showMessage('网络错误，请检查后端服务是否启动', false);
                console.error('注册失败：', error);
            }
        }

        // 登录功能
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            // 简单校验
            if (!email || !password) {
                showMessage('请填写邮箱和密码！', false);
                return;
            }

            try {
                // 调用后端登录接口
                const response = await fetch(`${BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 登录成功：保存token到本地存储
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({
                        id: data._id,
                        username: data.username,
                        email: data.email
                    }));
                    showMessage(`登录成功！欢迎 ${data.username}`, true);
                    // 可以跳转到首页
                    // window.location.href = 'home.html';
                } else {
                    showMessage(data.msg || '登录失败，邮箱或密码错误', false);
                }
            } catch (error) {
                showMessage('网络错误，请检查后端服务是否启动', false);
                console.error('登录失败：', error);
            }
        }

        // 页面加载时检查是否已登录
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (token) {
                const user = JSON.parse(localStorage.getItem('user'));
                showMessage(`你已登录：${user.username}`, true);
            }
        };
    </script>
</body>
</html>
